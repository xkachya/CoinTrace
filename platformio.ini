; PlatformIO Project Configuration File
; CoinTrace - Open Source Inductive Coin Analyzer
; License: GPL v3 + CERN OHL v2 (open hardware)
;
; Build options: build flags, source filter
; Upload options: custom upload port, speed and extra flags
; Library options: dependencies, extra library storages
; Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = cointrace-dev

; ═══════════════════════════════════════════════════════════
; Common settings (inherited by all environments)
; ═══════════════════════════════════════════════════════════
[env]
platform = espressif32 @ ^6.7.0
framework = arduino
monitor_speed = 115200
monitor_filters = 
    esp32_exception_decoder          ; Decode crash logs
    default

; Custom board for M5Stack Cardputer-Adv (Stamp-S3A, ESP32-S3FN8, 8MB Flash, no PSRAM)
; Board JSON lives in boards/m5cardputer-adv.json — contains flash_mode=qio,
; USB-CDC and partition settings.
board = m5cardputer-adv

; Build flags (common to all environments)
build_flags = 
    -DCORE_DEBUG_LEVEL=3             ; Debug level 0-5
    -DESP32S3                        ; ESP32-S3 variant

; Common library dependencies
lib_deps = 
    m5stack/M5Cardputer @ ^1.0.0     ; M5Stack hardware API
    Wire                             ; I2C (built-in for LDC1101)

; ═══════════════════════════════════════════════════════════
; DEVELOPMENT Environment - For active development
; ═══════════════════════════════════════════════════════════
[env:cointrace-dev]
build_type = debug
build_flags = 
    ${env.build_flags}
    
    ; CoinTrace version
    -DCOINTRACE_VERSION=\"1.0.0-dev\"
    
    ; Debug flags
    -DDEBUG_MODE=1
    -DSERIAL_DEBUG=1
    -DLDC1101_DEBUG=1                ; Enable LDC1101 debug logs
    -DCOINTRACE_DEBUG=1              ; Enable LOG_DEBUG macro (zero-cost in production)
    -ggdb                            ; GDB debug symbols
    -O0                              ; No optimization (faster compile)
    
    ; CoinTrace hardware configuration
    -DLDC1101_ENABLED=1              ; Enable LDC1101 sensor
    -DSINGLE_FREQUENCY=5000000       ; 5 MHz operating frequency
    -DDISTANCE_STEPS=4               ; 4 measurement distances
    
    ; LDC1101 pins (M5Stack Cardputer I2C)
    -DLDC1101_I2C_SDA=2              ; I2C SDA pin
    -DLDC1101_I2C_SCL=1              ; I2C SCL pin
    -DLDC1101_I2C_ADDR=0x2A          ; Default LDC1101 address

upload_port = COM3
upload_speed = 921600                ; Stable upload speed
monitor_port = COM3

lib_deps = 
    ${env.lib_deps}
    ; Add LDC1101 driver when available:
    ; local lib/LDC1101/ or from registry

; ═══════════════════════════════════════════════════════════
; PRODUCTION Environment - Optimized release build
; ═══════════════════════════════════════════════════════════
[env:cointrace-production]
build_type = release
build_flags = 
    ${env.build_flags}
    
    ; CoinTrace version (production)
    -DCOINTRACE_VERSION=\"1.0.0\"
    
    ; Release optimization
    -DRELEASE_BUILD=1
    -DNDEBUG                         ; Disable asserts
    -DCORE_DEBUG_LEVEL=1             ; Minimal logging
    -Os                              ; Optimize for size
    -ffunction-sections              ; Dead code elimination
    -fdata-sections
    -Wl,--gc-sections
    
    ; CoinTrace hardware configuration
    -DLDC1101_ENABLED=1
    -DSINGLE_FREQUENCY=5000000
    -DDISTANCE_STEPS=4
    
    ; LDC1101 pins
    -DLDC1101_I2C_SDA=2
    -DLDC1101_I2C_SCL=1
    -DLDC1101_I2C_ADDR=0x2A

upload_speed = 921600

lib_deps = 
    ${env.lib_deps}

; ═══════════════════════════════════════════════════════════
; TESTING Environment - Unit tests with Unity framework
; ═══════════════════════════════════════════════════════════
[env:cointrace-test]
build_flags = 
    ${env.build_flags}
    -DUNIT_TEST=1
    -DTEST_MODE=1
    -DCOINTRACE_VERSION=\"1.0.0-test\"

test_framework = unity               ; Unity test framework
test_build_src = yes                 ; Build src/ code for tests

lib_deps = 
    ${env.lib_deps}
    throwtheswitch/Unity @ ^2.5.2    ; Unit test framework

; ═══════════════════════════════════════════════════════════
; NATIVE Testing Environment — runs on PC, no device needed
; Pre-commit: pio test -e native-test  (~1 s)
; Covers: Logger, RingBufferTransport, LogEntry formatting.
; ═══════════════════════════════════════════════════════════
[env:native-test]
platform = native
framework =                          ; Override: native needs no Arduino framework

build_flags =
    -DUNIT_TEST=1
    -DNATIVE_TEST=1
    -DCOINTRACE_VERSION=\"1.0.0-test\"
    -DCOINTRACE_DEBUG=1
    -I test/mocks                    ; Shadow Arduino.h and freertos/ with mocks

; Only Unity — do NOT inherit ${env.lib_deps} (M5Cardputer won't compile on native)
lib_deps =
    throwtheswitch/Unity @ ^2.5.2

; src/main.cpp includes M5Cardputer → must NOT compile it on native
; test_build_src defaults to 'no', which is what we need
