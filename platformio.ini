; PlatformIO Project Configuration File
; CoinTrace - Open Source Inductive Coin Analyzer
; License: GPL v3 + CERN OHL v2 (open hardware)
;
; Build options: build flags, source filter
; Upload options: custom upload port, speed and extra flags
; Library options: dependencies, extra library storages
; Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = cointrace-dev

; ═══════════════════════════════════════════════════════════
; Common settings (inherited by all environments)
; ═══════════════════════════════════════════════════════════
[env]
platform = espressif32 @ ^6.7.0
framework = arduino
monitor_speed = 115200
monitor_filters = 
    esp32_exception_decoder          ; Decode crash logs
    default

; Board configuration for M5Stack Cardputer-Adv
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L       ; 240 MHz
board_build.flash_mode = dio
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv

; Build flags (common to all environments)
build_flags = 
    -DCORE_DEBUG_LEVEL=3             ; Debug level 0-5
    -DBOARD_HAS_PSRAM                ; M5Cardputer has 8MB PSRAM
    -mfix-esp32-psram-cache-issue    ; PSRAM stability fix
    -DARDUINO_USB_CDC_ON_BOOT=1      ; USB Serial
    -DARDUINO_USB_MODE=1
    -DESP32S3                        ; ESP32-S3 variant

; Common library dependencies
lib_deps = 
    m5stack/M5Cardputer @ ^1.0.0     ; M5Stack hardware API
    Wire                             ; I2C (built-in for LDC1101)

; ═══════════════════════════════════════════════════════════
; DEVELOPMENT Environment - For active development
; ═══════════════════════════════════════════════════════════
[env:cointrace-dev]
build_type = debug
build_flags = 
    ${env.build_flags}
    
    ; CoinTrace version
    -DCOINTRACE_VERSION=\"1.0.0-dev\"
    
    ; Debug flags
    -DDEBUG_MODE=1
    -DSERIAL_DEBUG=1
    -DLDC1101_DEBUG=1                ; Enable LDC1101 debug logs
    -ggdb                            ; GDB debug symbols
    -O0                              ; No optimization (faster compile)
    
    ; CoinTrace hardware configuration
    -DLDC1101_ENABLED=1              ; Enable LDC1101 sensor
    -DSINGLE_FREQUENCY=5000000       ; 5 MHz operating frequency
    -DDISTANCE_STEPS=4               ; 4 measurement distances
    
    ; LDC1101 pins (M5Stack Cardputer I2C)
    -DLDC1101_I2C_SDA=2              ; I2C SDA pin
    -DLDC1101_I2C_SCL=1              ; I2C SCL pin
    -DLDC1101_I2C_ADDR=0x2A          ; Default LDC1101 address

upload_speed = 921600                ; Stable upload speed

lib_deps = 
    ${env.lib_deps}
    ; Add LDC1101 driver when available:
    ; local lib/LDC1101/ or from registry

; ═══════════════════════════════════════════════════════════
; PRODUCTION Environment - Optimized release build
; ═══════════════════════════════════════════════════════════
[env:cointrace-production]
build_type = release
build_flags = 
    ${env.build_flags}
    
    ; CoinTrace version (production)
    -DCOINTRACE_VERSION=\"1.0.0\"
    
    ; Release optimization
    -DRELEASE_BUILD=1
    -DNDEBUG                         ; Disable asserts
    -DCORE_DEBUG_LEVEL=1             ; Minimal logging
    -Os                              ; Optimize for size
    -ffunction-sections              ; Dead code elimination
    -fdata-sections
    -Wl,--gc-sections
    
    ; CoinTrace hardware configuration
    -DLDC1101_ENABLED=1
    -DSINGLE_FREQUENCY=5000000
    -DDISTANCE_STEPS=4
    
    ; LDC1101 pins
    -DLDC1101_I2C_SDA=2
    -DLDC1101_I2C_SCL=1
    -DLDC1101_I2C_ADDR=0x2A

upload_speed = 921600

lib_deps = 
    ${env.lib_deps}

; ═══════════════════════════════════════════════════════════
; TESTING Environment - Unit tests with Unity framework
; ═══════════════════════════════════════════════════════════
[env:cointrace-test]
build_flags = 
    ${env.build_flags}
    -DUNIT_TEST=1
    -DTEST_MODE=1
    -DCOINTRACE_VERSION=\"1.0.0-test\"

test_framework = unity               ; Unity test framework
test_build_src = yes                 ; Build src/ code for tests

lib_deps = 
    ${env.lib_deps}
    throwtheswitch/Unity @ ^2.5.2    ; Unit test framework
