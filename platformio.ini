; PlatformIO Project Configuration File
; CoinTrace - Open Source Inductive Coin Analyzer
; License: GPL v3 + CERN OHL v2 (open hardware)
;
; Build options: build flags, source filter
; Upload options: custom upload port, speed and extra flags
; Library options: dependencies, extra library storages
; Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = cointrace-dev

; ═══════════════════════════════════════════════════════════
; Common settings (inherited by all environments)
; ═══════════════════════════════════════════════════════════
[env]
platform = espressif32 @ ^6.7.0
framework = arduino
monitor_speed = 115200
monitor_filters = 
    esp32_exception_decoder          ; Decode crash logs
    default

; Custom board for M5Stack Cardputer-Adv (Stamp-S3A, ESP32-S3FN8, 8MB Flash, no PSRAM)
; Board JSON lives in boards/m5cardputer-adv.json — contains flash_mode=qio,
; USB-CDC and partition settings.
board = m5cardputer-adv

; Build flags (common to all environments)
build_flags = 
    -DCORE_DEBUG_LEVEL=3             ; Debug level 0-5
    -DESP32S3                        ; ESP32-S3 variant
    -I include                       ; Expose project include/ to all libs (LDF chain)

; Common library dependencies
lib_deps = 
    m5stack/M5Cardputer @ ^1.0.0     ; M5Stack hardware API
    Wire                             ; I2C bus init in main.cpp — Wire.begin(8,9) per schematic §17.2 [2.3]
    bblanchon/ArduinoJson @ ^7.0.0   ; JSON serialization — MeasurementStore + LittleFSTransport (P-3)
; ═══════════════════════════════════════════════════════════
; DEVELOPMENT Environment - For active development
; ═══════════════════════════════════════════════════════════
[env:cointrace-dev]
build_type = debug
build_flags = 
    ${env.build_flags}
    
    ; CoinTrace version
    -DCOINTRACE_VERSION=\"1.0.0-dev\"
    
    ; Debug flags
    -DDEBUG_MODE=1
    -DSERIAL_DEBUG=1
    -DLDC1101_DEBUG=1                ; Enable LDC1101 debug logs
    -DCOINTRACE_DEBUG=1              ; Enable LOG_DEBUG macro (zero-cost in production)
    -ggdb                            ; GDB debug symbols
    -O0                              ; No optimization (faster compile)
    
    ; CoinTrace hardware configuration
    -DLDC1101_ENABLED=1              ; Enable LDC1101 sensor (SPI, CS=GPIO5)
    -DASYNCWEBSERVER_REGEX=1         ; Wave 8 A-2: enable regex path matching in HttpServer
    ; Wave 8 A-4: AsyncTCP task stack — default 4096 overflows during OTA flash.
    ; Call chain: onBody → Update.write → esp_ota_write → spi_flash_write ≈ 3.8 KB.
    ; 8192 leaves ~4 KB headroom; heap cost = +4 KB (acceptable at 30 KB free idle).
    -DCONFIG_ASYNC_TCP_STACK_SIZE=8192

    ; Note: SPI pins (VSPI) are configured in main.cpp: SCK=40, MISO=39, MOSI=14
    ; Note: I2C bus configured in main.cpp: Wire.begin(8,9) per schematic §17.2 [2.3]

board_build.filesystem = littlefs    ; LittleFS (ADR-ST-001)
board_build.partitions = partitions/cointrace_8MB.csv  ; Option B (ADR-ST-002)

upload_port = COM3
upload_speed = 921600                ; Stable upload speed
monitor_port = COM4                  ; FT232RL on EXT 2.54-14P G13/G15 (docs/guides/UART_DEBUG_SETUP.md)

lib_deps = 
    ${env.lib_deps}
    mathieucarbou/AsyncTCP @ ^3.3.2                  ; Wave 8 A-2: TCP transport for AsyncWebServer
    mathieucarbou/ESPAsyncWebServer @ ^3.6.0          ; Wave 8 A-2: non-blocking HTTP server
    ; LDC1101Plugin driver: lib/LDC1101Plugin/ (header-only, SPI)

; ═══════════════════════════════════════════════════════════
; OTA TEST Environment — identical to cointrace-dev but with
; bumped version string so pre/post OTA comparison is visible.
; Usage:
;   1. Flash baseline:  pio run -e cointrace-dev --target upload
;   2. Build OTA image: pio run -e cointrace-ota-test
;   3. Run test:        python scripts/test_ota_flash.py --env cointrace-ota-test
; ═══════════════════════════════════════════════════════════
[env:cointrace-ota-test]
build_type = debug
build_flags =
    ${env.build_flags}
    -DCOINTRACE_VERSION=\"1.0.1-ota-test\"
    -DDEBUG_MODE=1
    -DSERIAL_DEBUG=1
    -DLDC1101_DEBUG=1
    -DCOINTRACE_DEBUG=1
    -ggdb
    -O0
    -DLDC1101_ENABLED=1
    -DASYNCWEBSERVER_REGEX=1
    -DCONFIG_ASYNC_TCP_STACK_SIZE=8192

board_build.filesystem = littlefs
board_build.partitions = partitions/cointrace_8MB.csv

upload_port = COM3
upload_speed = 921600
monitor_port = COM4

lib_deps =
    ${env.lib_deps}
    mathieucarbou/AsyncTCP @ ^3.3.2
    mathieucarbou/ESPAsyncWebServer @ ^3.6.0

; ═══════════════════════════════════════════════════════════
; PRODUCTION Environment - Optimized release build
; ═══════════════════════════════════════════════════════════
[env:cointrace-production]
build_type = release
build_flags = 
    ${env.build_flags}
    
    ; CoinTrace version (production)
    -DCOINTRACE_VERSION=\"1.0.0\"
    
    ; Release optimization
    -DRELEASE_BUILD=1
    -DNDEBUG                         ; Disable asserts
    -DCORE_DEBUG_LEVEL=1             ; Minimal logging
    -Os                              ; Optimize for size
    -ffunction-sections              ; Dead code elimination
    -fdata-sections
    -Wl,--gc-sections
    
    ; CoinTrace hardware configuration
    -DLDC1101_ENABLED=1

    ; Note: SPI/I2C pin assignment mirrors cointrace-dev above

board_build.filesystem = littlefs
board_build.partitions = partitions/cointrace_8MB.csv

upload_port = COM3
upload_speed = 921600
monitor_port = COM3

lib_deps = 
    ${env.lib_deps}

; ═══════════════════════════════════════════════════════════
; UPLOADFS Environment — upload littlefs_sys partition only
; Usage: pio run -e uploadfs-sys -t uploadfs
; Safe: NEVER touches littlefs_data (user measurements + logs)
;
; Why extra_scripts?: PlatformIO built-in uploadfs always targets the LAST
; "spiffs" subtype partition in the CSV — which is littlefs_DATA on this board.
; scripts/upload_littlefs_sys.py parses the CSV and flashes to the correct
; partition offset directly via esptool. See docs/guides/UPLOADFS_GUIDE.md.
; ═══════════════════════════════════════════════════════════
[env:uploadfs-sys]
build_flags =
    ${env.build_flags}
    -DCOINTRACE_VERSION=\"1.0.0-dev\"
    -DLDC1101_ENABLED=1

board_build.filesystem = littlefs
board_build.partitions = partitions/cointrace_8MB.csv

; custom_partition_label is read by scripts/upload_littlefs_sys.py
custom_partition_label = littlefs_sys

; Hook: override uploadfs to flash the correct partition
; post: is required — pre: runs BEFORE the platform sets UPLOADFSCMD, so a
; pre: Replace would be immediately overwritten by the platform's main.py.
; post: runs AFTER platform setup, so our Replace sticks.
extra_scripts = post:scripts/upload_littlefs_sys.py

upload_port = COM3
upload_speed = 921600

lib_deps =
    ${env.lib_deps}

; ═══════════════════════════════════════════════════════════
; TESTING Environment - Unit tests with Unity framework
; ═══════════════════════════════════════════════════════════
[env:cointrace-test]
build_flags = 
    ${env.build_flags}
    -DUNIT_TEST=1
    -DTEST_MODE=1
    -DCOINTRACE_VERSION=\"1.0.0-test\"

test_framework = unity               ; Unity test framework
test_build_src = yes                 ; Build src/ code for tests

lib_deps = 
    ${env.lib_deps}
    throwtheswitch/Unity @ 2.6.1     ; Unit test framework (pinned: ^2.5.2 caused remove/reinstall cycle)

; ═══════════════════════════════════════════════════════════
; NATIVE Testing Environment — runs on PC, no device needed
; Pre-commit: pio test -e native-test  (~1 s)
; Covers: Logger, RingBufferTransport, LogEntry formatting.
; ═══════════════════════════════════════════════════════════
[env:native-test]
platform = native
framework =                          ; Override: native needs no Arduino framework

build_flags =
    -DUNIT_TEST=1
    -DNATIVE_TEST=1
    -DCOINTRACE_VERSION=\"1.0.0-test\"
    -DCOINTRACE_DEBUG=1
    -I test/mocks                    ; Shadow Arduino.h, LittleFS.h, etc. with mocks
    -I include                       ; IStorageManager.h (NVSManager dependency)

; test_jobs = 1: force sequential test builds on Windows + MinGW to avoid ld.exe race
; condition (file handle conflict on .o file between consecutive suite cleanups).
; Symptom: "ld.exe: reopening test_config_manager.o: No such file or directory"
; from VS Code Test Explorer. Terminal `pio test` is unaffected (already sequential).
test_jobs = 1

; ArduinoJson IS platform-independent — add explicitly (M5Cardputer still excluded).
lib_deps =
    throwtheswitch/Unity @ 2.6.1     ; pinned: ^2.5.2 caused remove/reinstall cycle in VS Code test runner
    bblanchon/ArduinoJson @ ^7.0.0   ; MeasurementStore needs JSON on native

; ConfigManager.cpp is pure C++ (no Arduino deps) — include it explicitly.
; main.cpp + PluginSystem.cpp use M5Cardputer/FreeRTOS → excluded.
test_build_src = yes
build_src_filter =
    +<ConfigManager.cpp>
    +<StorageManager/src/NVSManager.cpp>
    +<StorageManager/src/VectorCompute.cpp>
    +<StorageManager/src/FingerprintCache.cpp>
