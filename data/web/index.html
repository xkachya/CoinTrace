<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CoinTrace</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Coin<span>Trace</span><sup>TM</sup></h1>
  <span id="conn-badge">Connecting…</span>
</header>

<nav>
  <button class="active" data-tab="status">Status</button>
  <button data-tab="match">Match</button>
  <button data-tab="meas">Measurements</button>
  <button data-tab="log">Log</button>
  <button data-tab="settings">Settings</button>
</nav>

<main>

  <!-- ── Status page ──────────────────────────────────────────── -->
  <div id="page-status" class="page active">

    <div class="refresh-row">
      <button class="secondary" id="refresh-btn">Refresh</button>
      <span id="s-updated"></span>
    </div>

    <!-- Device -->
    <div class="card">
      <div class="card-title">Device</div>
      <div class="stat-grid">
        <div class="stat-item">
          <label>FIRMWARE</label>
          <div class="val small" id="s-version">—</div>
        </div>
        <div class="stat-item">
          <label>UPTIME</label>
          <div class="val" id="s-uptime">—</div>
        </div>
        <div class="stat-item">
          <label>WIFI</label>
          <div class="val small" id="s-wifi">—</div>
        </div>
        <div class="stat-item">
          <label>IP</label>
          <div class="val small" id="s-ip">—</div>
        </div>
        <div class="stat-item">
          <label>BLE</label>
          <div class="val small" id="s-ble">—</div>
        </div>
      </div>
    </div>

    <!-- Heap -->
    <div class="card">
      <div class="card-title">Memory</div>
      <div class="stat-grid">
        <div class="stat-item">
          <label>FREE HEAP</label>
          <div class="val" id="s-heap">—</div>
        </div>
        <div class="stat-item">
          <label>MIN EVER</label>
          <div class="val small" id="s-heap-min">—</div>
        </div>
        <div class="stat-item">
          <label>MAX BLOCK</label>
          <div class="val small" id="s-heap-block">—</div>
        </div>
      </div>
    </div>

    <!-- Sensor & DB -->
    <div class="card">
      <div class="card-title">Sensor &amp; Database</div>
      <div class="stat-grid">
        <div class="stat-item">
          <label>SENSOR</label>
          <div class="val small" id="s-sensor">—</div>
        </div>
        <div class="stat-item">
          <label>DB RECORDS</label>
          <div class="val" id="s-db-count">—</div>
        </div>
        <div class="stat-item">
          <label>DB STATUS</label>
          <div class="val small" id="s-db-ready">—</div>
        </div>
      </div>
    </div>

    <!-- OTA -->
    <div class="card">
      <div class="card-title">OTA</div>
      <div class="stat-grid">
        <div class="stat-item">
          <label>WINDOW</label>
          <div class="val small" id="s-ota">—</div>
        </div>
        <div class="stat-item">
          <label>PREV VERSION</label>
          <div class="val small" id="s-ota-pre">—</div>
        </div>
      </div>
    </div>

  </div><!-- /page-status -->

  <!-- ── Match page ───────────────────────────────────────────── -->
  <div id="page-match" class="page">

    <div class="card">
      <div class="card-title">Measurement Vector</div>
      <form id="match-form" autocomplete="off">
        <div class="field-grid">
          <div>
            <label for="f-dRp1">dRp1 (Ω)</label>
            <input id="f-dRp1" type="number" step="any" placeholder="e.g. 250.0" required>
          </div>
          <div>
            <label for="f-k1">k1</label>
            <input id="f-k1" type="number" step="any" placeholder="e.g. 0.82" required>
          </div>
          <div>
            <label for="f-k2">k2</label>
            <input id="f-k2" type="number" step="any" placeholder="e.g. 0.91" required>
          </div>
          <div>
            <label for="f-slope">slope_rp_per_mm_lr</label>
            <input id="f-slope" type="number" step="any" placeholder="e.g. -0.128" required>
          </div>
          <div>
            <label for="f-dL1">dL1 (µH)</label>
            <input id="f-dL1" type="number" step="any" placeholder="e.g. 450.0" required>
          </div>
        </div>
        <div class="btn-row">
          <button type="submit" class="primary" id="match-btn">Match</button>
          <span id="match-status"></span>
        </div>
      </form>
    </div>

    <div id="match-result"></div>

  </div><!-- /page-match -->

  <!-- ── Measurements page ─────────────────────────────────────── -->
  <div id="page-meas" class="page">

    <div class="nav-row">
      <button class="secondary" id="meas-prev" disabled>← Prev</button>
      <span class="nav-label" id="meas-nav">— / —</span>
      <button class="secondary" id="meas-next" disabled>Next →</button>
    </div>

    <div id="meas-result"></div>

  </div><!-- /page-meas -->

  <!-- ── Log page ────────────────────────────────────────────── -->
  <div id="page-log" class="page">

    <div class="log-toolbar">
      <select id="log-level-select">
        <option value="DEBUG">All levels</option>
        <option value="INFO">INFO+</option>
        <option value="WARNING">WARN+</option>
        <option value="ERROR">ERROR+</option>
      </select>
      <button class="secondary" id="log-clear-btn">Clear</button>
      <span id="log-count">0 lines</span>
    </div>

    <div id="log-output" class="log-output"></div>

  </div><!-- /page-log -->

  <!-- ── Settings page ─────────────────────────────────────────── -->
  <div id="page-settings" class="page">

    <div id="restart-banner" class="restart-banner">
      ⚠️ Display rotation change requires a device restart to take effect.
    </div>

    <div class="card">
      <div class="card-title">Device Settings</div>
      <form id="settings-form" autocomplete="off">
        <div class="settings-grid">
          <div>
            <label for="s-devname">Device Name</label>
            <input id="s-devname" type="text" maxlength="32" placeholder="CoinTrace">
          </div>
          <div>
            <label for="s-lang">Language</label>
            <select id="s-lang">
              <option value="en">English</option>
              <option value="uk">Українська</option>
            </select>
          </div>
          <div>
            <label for="s-displayrot">Display Rotation</label>
            <select id="s-displayrot">
              <option value="0">0°</option>
              <option value="1">90° (default)</option>
              <option value="2">180°</option>
              <option value="3">270°</option>
            </select>
          </div>
          <div>
            <label for="s-loglevel">Log Level</label>
            <select id="s-loglevel">
              <option value="0">DEBUG</option>
              <option value="1">INFO</option>
              <option value="2">WARNING</option>
              <option value="3">ERROR</option>
              <option value="4">FATAL</option>
            </select>
          </div>
          <div style="grid-column: 1 / -1">
            <label for="s-brightness">Brightness (<span id="s-brightness-val">128</span>)</label>
            <div class="range-row">
              <input id="s-brightness" type="range" min="0" max="255" value="128">
            </div>
          </div>
        </div>
        <div class="btn-row">
          <button type="submit" class="primary" id="settings-save">Save</button>
          <span id="settings-status"></span>
        </div>
      </form>
    </div>

  </div><!-- /page-settings -->

</main>

<script src="app.js"></script>
</body>
</html>
